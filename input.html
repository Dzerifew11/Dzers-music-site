<!DOCTYPE html>

<title>My Music</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #141e30, #243b55);
    color: white;
    text-align: center;
}

h1 {
    padding: 20px;
}

.container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
}

.card {
    background: #1e1e2f;
    padding: 15px;
    border-radius: 15px;
    width: 250px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

img {
    width: 100%;
    border-radius: 10px;
}

button.playBtn {
    margin-top: 10px;
    padding: 10px 15px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    background: #4cafef;
    color: white;
    font-size: 16px;
}

button.playBtn:hover {
    background: #2196f3;
}

.title {
    margin-top: 10px;
    font-size: 18px;
}
</style>

</head>

<body>

<h1>🎧 My Favorite Songs</h1>

<!-- JS ENDDA BO‘LISHI SHART -->
<script>
    
const buttons = document.querySelectorAll(".playBtn");
const audios = document.querySelectorAll("audio");

buttons.forEach((btn, index) => {
    btn.addEventListener("click", () => {
        const audio = audios[index];

        // boshqa hammasini to‘xtat
        audios.forEach((a, i) => {
            if (i !== index) {
                a.pause();
                a.currentTime = 0;
                buttons[i].textContent = "▶ Play";
            }
        });

        // play / pause
        if (audio.paused) {
            audio.play();
            btn.textContent = "⏸ Pause";
        } else {
            audio.pause();
            btn.textContent = "▶ Play";
        }
    });
});
</script>
